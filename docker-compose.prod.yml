# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Changes vs docker-compose.yml (dev):
#   - Backend code is bind-mounted (Python is interpreted — no build step):
#     a code change only needs `restart`, not `--build`. Rebuild the backend
#     image ONLY when requirements.txt changes. The image still bakes the code
#     (COPY . .) as a fallback; the mount just overlays the live source.
#   - Frontend is still baked at build time (needs `npm run build`)
#   - Frontend uses the optimized `runner` target (next build + node server.js)
#   - Backend port bound to 127.0.0.1 only (nginx is the public entry point)
#   - Frontend port bound to 127.0.0.1 only (nginx is the public entry point)
#   - nginx reverse proxy in front, terminating TLS on 443 (redirects 80 -> 443)
#   - Resource limits prevent runaway jobs from OOM-killing the host

services:
  backend:
    # Bind-mount du code (Python interprété) : un changement de code ne demande
    # qu'un `restart`, pas un `--build`. Rebuild de l'image seulement si
    # requirements.txt change. Les deps restent dans l'image (site-packages),
    # le mount n'écrase que /app (source + entrypoint, versionnés).
    volumes:
      - ./backend:/app
    # Pas de bind host réseau: nginx parle au backend via le réseau Docker interne.
    # Pour debug, exposer ponctuellement: docker compose ... run --service-ports backend
    ports: !reset []
    environment:
      # Le scheduler tourne dans son propre container (service `scheduler` ci-dessous).
      # Activer ici dupliquerait chaque job → SSH/alertes en double.
      SCHEDULER_ENABLED: "false"
      # API stateless : on peut scaler les workers en toute sécurité maintenant
      # que le scheduler est isolé. Ajuster selon les CPU dispo.
      UVICORN_WORKERS: "${UVICORN_WORKERS:-2}"
    deploy:
      resources:
        limits:
          memory: 512m

  # Scheduler "fast" : disponibilité (device_ping) + maintenance, tout async
  # léger. Isolé du container "heavy" ci-dessous pour que le heartbeat de
  # disponibilité ne soit JAMAIS affamé par la fan-out SSH (GIL). À ~1000+
  # devices, un scheduler unique gelait le device_ping ~20 min (last_seen figé).
  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    # Même bind-mount que backend (image partagée) : code à chaud, restart suffit.
    volumes:
      - ./backend:/app
    environment:
      # Force-on même si le .env l'a désactivé : ce container n'existe que pour ça.
      SCHEDULER_ENABLED: "true"
      RUN_MODE: "scheduler"
      SCHEDULER_GROUP: "fast"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        # Attend que l'API tourne (donc que les migrations Alembic soient passées).
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512m
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # Scheduler "heavy" : SSH (sonde transit/latence LR, lr_plan, client_block) +
  # gros fan-outs API (snmp/ltu/airos/af60/power/uisp_sync). Sa pression
  # GIL/threads reste confinée ici → n'impacte plus la disponibilité.
  scheduler-heavy:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    # Même bind-mount que backend (image partagée) : code à chaud, restart suffit.
    volumes:
      - ./backend:/app
    environment:
      SCHEDULER_ENABLED: "true"
      RUN_MODE: "scheduler"
      SCHEDULER_GROUP: "heavy"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          # Plus de RAM que le "fast" : pool de threads SSH (lr_probe_concurrency)
          # + fan-outs API sur tout le parc.
          memory: 1g
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # NetFlow collector — receives NetFlow from the edge router (MikroTik). The
  # loopback port from docker-compose.yml is useless here (the router can't reach
  # the server's loopback), so we drop it; the ONLY publish address is added by
  # docker-compose.lan.yml on the LAN IP (never 0.0.0.0 — same rule as nginx).
  # Restrict the source to the router at the host/FortiGate firewall (NetFlow is
  # unauthenticated UDP).
  netflow-collector:
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 256m

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: runner
    volumes: !reset []
    ports: !reset []
    deploy:
      resources:
        limits:
          memory: 512m

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    # Bound to 127.0.0.1 only — the supervisor is NOT exposed on the public
    # interface. Public/remote admin access goes through an SSH tunnel:
    #   ssh -L 8443:127.0.0.1:443 a2@<server>  →  https://localhost:8443/
    # Rationale: incident 2026-05-17 — a public 0.0.0.0 binding let an
    # automated scanner reach /api/proxy and wipe the device inventory.
    #
    # Direct LAN access (no tunnel) is now supported by the auth layer (login +
    # server-side sessions, see backend/app/services/auth_service.py). Enable it
    # by ALSO composing docker-compose.lan.yml, which adds a binding on the
    # server's private LAN IP only — never 0.0.0.0, so the public interface
    # stays tunnel-only. Do NOT bind 0.0.0.0 here.
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.1 443 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
