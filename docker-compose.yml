services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-supervisor}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be defined in .env}
      POSTGRES_DB: ${POSTGRES_DB:-network_supervisor}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-supervisor} -d ${POSTGRES_DB:-network_supervisor}"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/api/v1/health > /dev/null"]
      interval: 10s
      timeout: 5s
      retries: 3
      # 90 s absorbe les migrations lourdes (création de matviews, indexes,
      # vacuum), sinon le scheduler dépendant de backend:service_healthy se
      # retrouve en "Created" et il faut le démarrer à la main. Une fois la
      # première migration passée, le healthcheck répond en < 1 s, donc le
      # délai ne se voit pas au déploiement courant.
      start_period: 90s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

  # NetFlow collector — listens for NetFlow exported by the edge router (MikroTik)
  # and aggregates top client→Internet destinations by ASN/operator into
  # traffic_dest_stats (RUN_MODE=collector, app/tasks/collector_runner.py). A UDP
  # listener is permanent, not interval-based, so it runs in its own process —
  # never inside an APScheduler job. Off by default (NETFLOW_COLLECTOR_ENABLED) —
  # the container then idles. In dev the UDP port is bound on loopback so a local
  # packet generator can reach it.
  netflow-collector:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      RUN_MODE: "collector"
    ports:
      - "127.0.0.1:2055:2055/udp"
    volumes:
      - ./backend:/app
    depends_on:
      backend:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - API_KEY=${API_KEY}
      # Dev only: no nginx, Next dev (:3000) does not proxy /api/v1, so the
      # modem-shell WebSocket reaches the backend directly. In prod this is
      # unset → same-origin via nginx (see docker-compose.prod.yml).
      - NEXT_PUBLIC_BACKEND_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 > /dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  postgres_data:
