worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr [$time_local] "$request" $status $body_bytes_sent "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 10m;

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/x-font-ttf image/svg+xml;
    gzip_min_length 1000;
    gzip_proxied any;

    # Rate limiting sur les appels API directs (outils externes, monitoring)
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;

    server {
        listen 80;
        server_name _;

        # ---------------------------------------------------------------
        # Frontend Next.js (toutes les routes)
        # ---------------------------------------------------------------
        location / {
            proxy_pass         http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            # WebSocket support (hot-reload en dev, SSE éventuel)
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 60s;
        }

        # ---------------------------------------------------------------
        # Backend FastAPI — accès direct depuis outils externes
        # (le frontend passe déjà par /api/proxy → backend)
        # ---------------------------------------------------------------
        location /api/v1/ {
            limit_req zone=api burst=30 nodelay;
            proxy_pass         http://backend:8000;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }
    }
}
